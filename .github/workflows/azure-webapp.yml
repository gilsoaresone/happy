name: Build and Deploy Azure Web App

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  NODE_VERSION: '22'
  AZURE_WEBAPP_NAME: happy-gilsoaresone-20260411

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test -- --watch=false --browsers=ChromeHeadless

      - name: Build app
        run: npm run build

      - name: Create deployment package
        run: |
          mkdir -p deploy/dist/feliz-aniversario
          mkdir -p deploy/data
          cp package.json deploy/
          cp server.js deploy/
          cp -R data/. deploy/data/
          cp -R dist/feliz-aniversario/browser deploy/dist/feliz-aniversario/
          cd deploy
          zip -r ../release.zip .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-package
          path: release.zip

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: production
      url: ${{ steps.deploy.outputs.webapp-url }}

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: app-package

      - name: Deploy to Azure Web App
        id: deploy
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: release.zip

      - name: Reset guestbook data on Azure
        if: contains(github.event.head_commit.message, '[reset-guestbook]')
        env:
          AZURE_WEBAPP_PUBLISH_PROFILE: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
        run: |
          python3 - <<'PY'
          import base64
          import json
          import os
          import urllib.request
          import xml.etree.ElementTree as ET

          profile_xml = os.environ['AZURE_WEBAPP_PUBLISH_PROFILE']
          root = ET.fromstring(profile_xml)
          publish_profile = next(
              profile
              for profile in root.findall('.//publishProfile')
              if '.scm.azurewebsites.net' in (profile.get('publishUrl') or '')
          )

          publish_url = publish_profile.get('publishUrl').split(':')[0]
          username = publish_profile.get('userName')
          password = publish_profile.get('userPWD')
          credentials = base64.b64encode(f'{username}:{password}'.encode('utf-8')).decode('ascii')

          payload = json.dumps(
              {
                  'command': "TARGET=\"${BIRTHDAY_DATA_FILE:-/home/site/wwwroot/data/birthday-posts.json}\"; mkdir -p \"$(dirname \"$TARGET\")\"; printf '[]\\n' > \"$TARGET\"; printf 'Reset file: %s\\n' \"$TARGET\"; cat \"$TARGET\"",
                  'dir': '/home/site/wwwroot',
              }
          ).encode('utf-8')

          request = urllib.request.Request(
              f'https://{publish_url}/api/command',
              data=payload,
              headers={
                  'Authorization': f'Basic {credentials}',
                  'Content-Type': 'application/json',
              },
              method='POST',
          )

          with urllib.request.urlopen(request) as response:
              print(response.read().decode('utf-8'))
          PY
