name: Build and Deploy Azure Web App

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  NODE_VERSION: '22'
  AZURE_WEBAPP_NAME: happy-gilsoaresone-20260411

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test -- --watch=false --browsers=ChromeHeadless

      - name: Build app
        run: npm run build

      - name: Create deployment package
        run: |
          mkdir -p deploy/dist/feliz-aniversario
          cp package.json deploy/
          cp server.js deploy/
          cp -R dist/feliz-aniversario/browser deploy/dist/feliz-aniversario/
          cd deploy
          zip -r ../release.zip .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-package
          path: release.zip

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: production
      url: ${{ steps.deploy.outputs.webapp-url }}

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: app-package

      - name: Deploy to Azure Web App
        id: deploy
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: release.zip

      - name: Remove selected guestbook posts on Azure
        if: contains(github.event.head_commit.message, '[prune-guestbook-posts]')
        run: |
          python3 - <<'PY'
          import json
          import urllib.request

          request = urllib.request.Request(
              'https://happy-gilsoaresone-20260411.azurewebsites.net/api/internal/prune-posts-20260418-7b91f4d2',
              data=b'{}',
              headers={'Content-Type': 'application/json'},
              method='POST',
          )

          with urllib.request.urlopen(request, timeout=60) as response:
              result = json.loads(response.read().decode('utf-8'))

          print(json.dumps(result))
          PY

      - name: Verify guestbook pruning
        if: contains(github.event.head_commit.message, '[prune-guestbook-posts]')
        run: |
          python3 - <<'PY'
          import json
          import urllib.request

          remove_ids = {1776542114621, 1776542006576, 1776538446050}
          url = 'https://happy-gilsoaresone-20260411.azurewebsites.net/api/posts'

          with urllib.request.urlopen(url, timeout=60) as response:
              posts = json.loads(response.read().decode('utf-8'))

          remaining_ids = {int(post['id']) for post in posts}
          found_removed = sorted(remove_ids & remaining_ids)

          if found_removed:
              raise SystemExit(f'Removed IDs still present: {found_removed}')

          print(f'Verified posts after pruning: {len(posts)}')
          PY
